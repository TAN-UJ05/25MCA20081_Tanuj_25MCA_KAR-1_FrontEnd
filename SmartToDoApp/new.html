<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="new.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <h2 class="text-center m-4">Smart To-Do Manager</h2>
        <div class="card p-2">
            <div class="row-g-2">
                <div class="col-md-4 m-2">
                    <input type="text" id="taskInput" class="form-control" placeholder="Task Name">
                </div>
                <div class="col-md-3 m-2">
                    <select id="priorityInput" class="form-select">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select> 
                </div>
                <div class="col-md-3 m-2">
                    <input type="date" id="dateInput" class="form-control">
                </div>
                <div class="col-md-2 m-2">
                    <button class="btn btn-primary w-100" onclick="addTask()">Add Task</button>
                </div>
            </div>
        </div>
        <div class="text-primary m-2">
            <button class="btn btn-outline-primary m-1" onclick="setFilter('all')">All</button>
            <button class="btn btn-outline-success m-1" onclick="setFilter('completed')">Completed</button>
            <button class="btn btn-outline-danger m-1" onclick="setFilter('pending')">Pending</button>
        </div>
        <div class="text-center m-2">
            <button class="btn btn-secondary m-1" onclick="sortPriority()">Sort Priority</button>
            <button class="btn btn-secondary m-1" onclick="sortDeadline()">Sort Deadline</button>
        </div>
        <div class="card text-center p-2 m-2">
            <div class="row">
                <div class="col">Total Tasks: <span id="totalCount">0</span></div>
                <div class="col">Completed Tasks: <span id="completedCount">0</span></div>
                <div class="col">Pending Tasks: <span id="pendingCount">0</span></div>
            </div>
        </div>
    </div>
    <script src="new.js"></script>
</body>
</html>
